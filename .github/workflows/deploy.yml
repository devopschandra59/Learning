name: Salesforce DX CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  salesforce-ci:
    runs-on: ubuntu-latest

    env:
      SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
      TARGET_ORG: UAT

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate Org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > ./auth.txt
          sf org login sfdx-url --sfdx-url-file ./auth.txt --alias $TARGET_ORG

      - name: Validate Deployment
        if: github.event_name == 'pull_request'
        run: |
          sf project deploy start --source-dir force-app --target-org $TARGET_ORG --dry-run --wait 10

      - name: Deploy to Org
        if: github.ref == 'refs/heads/main'
        run: |
          sf project deploy start --source-dir force-app --target-org $TARGET_ORG --wait 30

      - name: Run Apex Tests
        if: github.ref == 'refs/heads/main'
        run: |
          sf apex run test --target-org $TARGET_ORG --result-format human --wait 30